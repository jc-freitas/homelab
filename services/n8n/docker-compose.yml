
services:
  n8n:
    image: n8nio/n8n
    restart: always
    ports:
      - "5678:5678"
      - "5679:5679"
    environment:
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=true
      - N8N_HOST=${SUBDOMAIN}.${DOMAIN_NAME}
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - NODE_ENV=production
      - WEBHOOK_URL=https://${SUBDOMAIN}.${DOMAIN_NAME}/
      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE}
      - TZ=${GENERIC_TIMEZONE}
      - NODE_FUNCTION_ALLOW_EXTERNAL=*
      - NODES_EXCLUDE=[]
    volumes:
      - n8n_data:/home/node/.n8n
      - /mnt/storage:/storage
volumes:
  n8n_data: