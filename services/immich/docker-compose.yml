
services:
  immich-server:
    container_name: immich_server
    image: ghcr.io/immich-app/immich-server:v2.7.5
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - /mnt/immich/upload:/data
      - /etc/localtime:/etc/localtime:ro
    ports:
      - '10.0.20.2:2283:2283'
    depends_on:
      - database
    restart: always
    healthcheck:
      disable: false
    environment:
      - UPLOAD_LOCATION=/data
      - REDIS_HOSTNAME=redis-shared
      - REDIS_DBINDEX=2
    env_file:
      - .env
    networks:
      - default
      - shared-infra

  immich-machine-learning:
    container_name: immich_machine_learning
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - 104
      - video
    image: ghcr.io/immich-app/immich-machine-learning:v2.7.5
    volumes:
      - model-cache:/cache
    restart: always
    healthcheck:
      disable: false
    env_file:
      - .env

  database:
    container_name: immich_postgres
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:bcf63357191b76a916ae5eb93464d65c07511da41e3bf7a8416db519b40b1c23
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_DB: ${DB_DATABASE_NAME}
      POSTGRES_INITDB_ARGS: '--data-checksums'
    volumes:
      - immich_db:/var/lib/postgresql/data
    shm_size: 128mb
    restart: always
    healthcheck:
      disable: false
    env_file:
      - .env

  postgres-exporter:
    container_name: immich-postgres-exporter
    image: prometheuscommunity/postgres-exporter:v0.15.0
    restart: always
    environment:
      DATA_SOURCE_USER: ${DB_USERNAME}
      DATA_SOURCE_PASS: ${DB_PASSWORD}
      DATA_SOURCE_URI: "database:5432/${DB_DATABASE_NAME}?sslmode=disable"
    networks:
      - default
      - monitoring

volumes:
  model-cache:
  immich_db:

networks:
  default:
  shared-infra:
    external: true
    name: shared-infra
  monitoring:
    external: true
    name: monitoring
