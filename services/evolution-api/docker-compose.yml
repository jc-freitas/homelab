services:
  api:
    container_name: evolution_api
    image: evoapicloud/evolution-api:latest
    restart: always
    depends_on:
      - evolution-postgres
    ports:
      - "8080:8080"
    volumes:
      - evolution_instances:/evolution/instances
    networks:
      - evolution-net
      - shared-infra
    env_file: .env
    expose:
      - "8080"

  frontend:
    container_name: evolution_frontend
    image: evoapicloud/evolution-manager:latest
    entrypoint: /bin/sh
    command: >
      -c "
      if [ -f /etc/nginx/conf.d/nginx.conf ]; then
        sed -i 's/ must-revalidate//g' /etc/nginx/conf.d/nginx.conf;
      fi &&
      nginx -g 'daemon off;'
      "
    restart: always
    ports:
      - "3000:80"
    networks:
      - evolution-net
    

  evolution-postgres:
    container_name: evolution_postgres
    image: postgres:15
    restart: always
    command:
      - postgres
      - -c
      - max_connections=1000
      - -c
      - listen_addresses=*
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      evolution-net:
        aliases:
          - evolution-postgres
    expose:
      - "5432"

  postgres-exporter:
    container_name: evolution-postgres-exporter
    image: prometheuscommunity/postgres-exporter:v0.15.0
    restart: always
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@evolution-postgres:5432/${POSTGRES_DB}?sslmode=disable"
    networks:
      - evolution-net
      - monitoring

volumes:
  evolution_instances:
  postgres_data:

networks:
  evolution-net:
    name: evolution-net
    driver: bridge
  shared-infra:
    external: true
    name: shared-infra
  monitoring:
    external: true
    name: monitoring