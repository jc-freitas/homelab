services:
  web:
    image: ghcr.io/dispatcharr/dispatcharr:latest
    container_name: dispatcharr_web
    restart: unless-stopped

    ports:
      - "10.0.20.2:9191:9191"

    depends_on:
      db:
        condition: service_healthy

    environment:
      DISPATCHARR_ENV: modular

      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: dispatcharr
      POSTGRES_USER: dispatch
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

      REDIS_HOST: redis-shared
      REDIS_PORT: 6379
      REDIS_DB: 0

      DISPATCHARR_LOG_LEVEL: info

      # GPU transcoding priority
      UWSGI_NICE_LEVEL: -5

    volumes:
      - ./data:/data

    extra_hosts:
      - "host.docker.internal:host-gateway"

    cap_add:
      - SYS_NICE

    # Intel/AMD GPU acceleration
    devices:
      - /dev/dri:/dev/dri

    group_add:
      - video
      - render

    security_opt:
      - no-new-privileges:true

    mem_limit: 6g
    cpus: 4

    networks:
      - default
      - shared-infra

  celery:
    image: ghcr.io/dispatcharr/dispatcharr:latest
    container_name: dispatcharr_celery
    restart: unless-stopped

    entrypoint: ["/app/docker/entrypoint.celery.sh"]

    depends_on:
      db:
        condition: service_healthy
      web:
        condition: service_started

    environment:
      DISPATCHARR_ENV: modular

      DISPATCHARR_PORT: 9191

      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: dispatcharr
      POSTGRES_USER: dispatch
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

      REDIS_HOST: redis-shared
      REDIS_PORT: 6379
      REDIS_DB: 0

      DISPATCHARR_LOG_LEVEL: info

      DJANGO_SETTINGS_MODULE: dispatcharr.settings
      PYTHONUNBUFFERED: 1

      # Lower priority for background jobs
      CELERY_NICE_LEVEL: 5

    volumes:
      - ./data:/data

    extra_hosts:
      - "host.docker.internal:host-gateway"

    security_opt:
      - no-new-privileges:true

    mem_limit: 4g
    cpus: 2

    networks:
      - default
      - shared-infra

  db:
    image: postgres:17-alpine
    container_name: dispatcharr_db
    restart: unless-stopped

    environment:
      POSTGRES_DB: dispatcharr
      POSTGRES_USER: dispatch
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dispatch -d dispatcharr"]
      interval: 10s
      timeout: 5s
      retries: 5

    security_opt:
      - no-new-privileges:true

    mem_limit: 2g

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: dispatcharr-postgres-exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://dispatch:${POSTGRES_PASSWORD}@db:5432/dispatcharr?sslmode=disable"
    networks:
      - default
      - monitoring

volumes:
  postgres_data:

networks:
  default:
  shared-infra:
    external: true
    name: shared-infra
  monitoring:
    external: true
    name: monitoring
